# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject build info
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          COMMIT=$(git rev-parse --short HEAD)
          REF=${GITHUB_REF#refs/*/}

          sed -i "s|{{BUILD_TIME}}|$BUILD_TIME|g" index.html about.html _includes/layout.njk
          sed -i "s|{{COMMIT}}|$COMMIT|g" index.html about.html _includes/layout.njk
          sed -i "s|{{REF}}|$REF|g" index.html about.html _includes/layout.njk

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
