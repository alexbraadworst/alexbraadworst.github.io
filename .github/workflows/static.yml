name: Deploy static content to Neocities

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "neocities"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Eleventy Site
        run: npm run build

      - name: Inject build info everywhere
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          COMMIT=$(git rev-parse --short HEAD)
          REF=${GITHUB_REF#refs/*/}

          find _site -name "*.html" -exec sed -i "s|{{BUILD_TIME}}|$BUILD_TIME|g; s|{{COMMIT}}|$COMMIT|g; s|{{REF}}|$REF|g" {} +
      
      - name: Deploy to Nekoweb
        uses: indiefellas/deploy2nekoweb@main
        with:
          nekoweb-api-key: ${{ secrets.NEKOWEB_API_TOKEN }}
          nekoweb-domain: 'harakiri.moe'
          nekoweb-username: 'seppuku'
          directory: '_site'
