# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Eleventy Site
        run: npm run build

      - name: Inject build info everywhere
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          COMMIT=$(git rev-parse --short HEAD)
          REF=${GITHUB_REF#refs/*/}

          # Finds every HTML file generated inside _site and replaces placeholders
          find _site -name "*.html" -exec sed -i "s|{{BUILD_TIME}}|$BUILD_TIME|g; s|{{COMMIT}}|$COMMIT|g; s|{{REF}}|$REF|g" {} +

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4